name: Java CI with Maven

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v7
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn -B package -pl v-lucide-icons --file pom.xml
    - name: Upload JAR
      uses: actions/upload-artifact@v7
      with:
        name: v-lucide-icons
        path: v-lucide-icons/target/*.jar

